# Daily Signal Board scoring — writes symbol_scores for one pinned tip day
# (MAX bar date across the batch, or --as-of) so the dash leaderboard does
# not fragment to a 1–2 row board after thin sessions / limit smokes.
#
# Requires repo secret: DATABASE_URL.
# Daily after CSE close. Optional pause: vars.KOEL_OPS_PAUSE=1 (legacy KOEL_DAILY_OPS=0 no longer blocks cake jobs).
#
# Research scores only — not financial advice. Postgres + CSE path bars only.

name: score-signals

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: Optional YYYY-MM-DD historical tip (leave empty for latest bars)
        required: false
        default: ""
      limit:
        description: Max symbols (0 = all with daily bars)
        required: false
        default: "0"
  schedule:
    # Daily ~16:45 Asia/Colombo (11:15 UTC) — after CSE close (14:30 SLT).
    - cron: "15 11 * * *"

concurrency:
  group: score-signals
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.KOEL_OPS_PAUSE != '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Require DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL secret is not set"
            exit 1
          fi

      - name: Migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m koel migrate

      - name: Score Signal Board
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Keep ML forecast emission on the ml-self-learn workflow.
          ML_FORECAST_ENABLED: "0"
        run: |
          LIMIT="${{ github.event.inputs.limit || '0' }}"
          AS_OF="${{ github.event.inputs.as_of || '' }}"
          if [ -n "$AS_OF" ]; then
            python -m koel score-signals --limit "$LIMIT" --as-of "$AS_OF"
          else
            python -m koel score-signals --limit "$LIMIT"
          fi
