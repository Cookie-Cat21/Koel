# Optional scheduled PDF enrich + metrics/briefs drains (Track C).
# Requires repo secrets: DATABASE_URL. Optional AI_* for drain-briefs.
# Does not scrape competitors — uses Koel's CSE JSON + CDN adapters only.

name: pdf-metrics-drain

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Max rows per drain step
        required: false
        default: "30"
      run_briefs:
        description: Also drain AI briefs (needs AI_BRIEFS_ENABLED + keys)
        required: false
        default: "false"
  schedule:
    # Every hour — backlog clear outside market-hours poller idle.
    - cron: "15 * * * *"

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m koel migrate
      - name: Drain PDFs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PDF_ENRICH_SLEEP_SECONDS: "0.5"
          CSE_MIN_INTERVAL_SECONDS: "0.2"
        run: |
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          python -m koel drain-pdfs --limit "$LIMIT"
      - name: Drain metrics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FINANCIAL_METRICS_ENABLED: ${{ vars.FINANCIAL_METRICS_ENABLED || '0' }}
          FILING_COMPARE_ENABLED: ${{ vars.FILING_COMPARE_ENABLED || '0' }}
          METRICS_SHADOW_MODE: "1"
        run: |
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          python -m koel drain-metrics --limit "$LIMIT"
      - name: Drain graph (ownership / equity links)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CSE_MIN_INTERVAL_SECONDS: "0.2"
        run: |
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          python -m koel drain-graph --limit "$LIMIT"
      - name: Drain people (directors from PDFs)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CSE_MIN_INTERVAL_SECONDS: "0.2"
        run: |
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          python -m koel drain-people --limit "$LIMIT"
      - name: Drain briefs (optional)
        if: ${{ github.event.inputs.run_briefs == 'true' || vars.DRAIN_BRIEFS == '1' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AI_BRIEFS_ENABLED: ${{ secrets.AI_BRIEFS_ENABLED || '0' }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'gemini' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'gemini-2.0-flash' }}
          AI_BACKUP_PROVIDERS: ${{ secrets.AI_BACKUP_PROVIDERS }}
          AI_BACKUP_API_KEYS: ${{ secrets.AI_BACKUP_API_KEYS }}
          AI_BACKUP_MODELS: ${{ secrets.AI_BACKUP_MODELS }}
          AI_MAX_BRIEFS_PER_DAY: "50"
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          python -m koel drain-briefs --limit "$LIMIT"
