# Exhaustive CPU challenger search. Manual only; never promotes or writes forecasts.
# Required secret: ML_DATABASE_URL (SELECT-only Neon role strongly recommended).
# Prefer the direct (non-pooler) Neon endpoint — streaming snapshot export breaks
# on PgBouncer transaction pooling.
name: ml-cpu-exhaust

on:
  workflow_dispatch:
    inputs:
      target:
        description: Prediction target
        required: true
        default: relative
        type: choice
        options: [relative, absolute]
      horizon:
        description: Trading-session horizon
        required: true
        default: "1"
        type: choice
        options: ["1", "5", "10"]
      hyper_limit:
        description: LightGBM calibration-only configs to screen (max 10000)
        required: true
        default: "10000"
        type: string
      skip_hyper:
        description: Skip the 10k LightGBM screen (family+nested only)
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      screen_top_k:
        description: How many family-screen survivors enter nested folds
        required: true
        default: "6"
        type: string

permissions:
  contents: read

concurrency:
  group: ml-cpu-exhaust-${{ github.ref }}
  cancel-in-progress: false

jobs:
  exhaust:
    name: CPU exhaust ${{ inputs.target }} h${{ inputs.horizon }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ML dependencies
        run: pip install -e ".[ml]"

      - name: Require read-only ML database secret
        env:
          ML_DATABASE_URL: ${{ secrets.ML_DATABASE_URL }}
        run: |
          if [ -z "${ML_DATABASE_URL}" ]; then
            echo "::error::ML_DATABASE_URL is not set"
            exit 1
          fi

      - name: Export immutable hybrid snapshot
        env:
          ML_DATABASE_URL: ${{ secrets.ML_DATABASE_URL }}
        run: |
          set -euo pipefail
          python -m koel.ml.snapshot export \
            --dataset hybrid \
            --output artifacts/ml-cpu-exhaust/snapshot

      - name: Run CPU exhaust ladder
        env:
          ML_WORKER_THREADS: "2"
        run: |
          set -euo pipefail
          mkdir -p artifacts/ml-cpu-exhaust/report
          EXTRA=()
          if [ "${{ inputs.skip_hyper }}" = "true" ]; then
            EXTRA+=(--skip-hyper)
          fi
          python -m koel.ml.cpu_exhaust \
            --snapshot artifacts/ml-cpu-exhaust/snapshot \
            --output artifacts/ml-cpu-exhaust/report \
            --target "${{ inputs.target }}" \
            --horizon "${{ inputs.horizon }}" \
            --evaluation-domain cse \
            --max-flat-fraction 0.40 \
            --screen-top-k "${{ inputs.screen_top_k }}" \
            --nested-folds 3 \
            --nested-seeds 0,1,2 \
            --hyper-limit "${{ inputs.hyper_limit }}" \
            --hyper-top-k 10 \
            --hyper-workers 1 \
            "${EXTRA[@]}"
          cat artifacts/ml-cpu-exhaust/report/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload exhaust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-cpu-exhaust-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ml-cpu-exhaust/
          if-no-files-found: error
          retention-days: 30
