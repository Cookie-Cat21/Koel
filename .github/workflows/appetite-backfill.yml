# Optional market appetite daily series backfill (CSE path → appetite).
# Requires repo secret: DATABASE_URL. Prefer after path-backfill has bars.
# Daily after CSE close. Optional pause: vars.KOEL_OPS_PAUSE=1 (legacy KOEL_DAILY_OPS=0 no longer blocks cake jobs).
#
# Research meter only — not financial advice.

# ops: push-path catch-up enabled
name: appetite-backfill

on:
  # Catch-up when this workflow file lands on main (Health checklist
  # matches by workflow name; agents cannot workflow_dispatch).
  push:
    branches: [main]
    paths:
      - ".github/workflows/appetite-backfill.yml"
  workflow_dispatch:
  schedule:
    # Daily ~17:15 Asia/Colombo (11:45 UTC) — after CSE close + score-signals.
    - cron: "45 11 * * *"

concurrency:
  group: appetite-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      vars.KOEL_OPS_PAUSE != '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Require DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL secret is not set"
            exit 1
          fi
      - name: Migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m koel migrate
      - name: Appetite backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m koel appetite-backfill --force
