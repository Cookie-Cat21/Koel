# Daily CSE market tick — prices, disclosures, share-split detection / alerts.
# Requires repo secrets: DATABASE_URL, TELEGRAM_BOT_TOKEN.
# Optional pause: vars.KOEL_DAILY_OPS=0.
#
# Uses --force so the tick runs outside market hours (EOD catch-up).
# Not financial advice.

name: market-tick

on:
  workflow_dispatch:
  schedule:
    # Daily ~15:00 Asia/Colombo (09:30 UTC) — after CSE close (14:30 SLT).
    - cron: "30 9 * * *"

concurrency:
  group: market-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.KOEL_DAILY_OPS != '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Require secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN secret is not set"
            exit 1
          fi
      - name: Migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m koel migrate
      - name: Market tick (force)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m koel tick --force
