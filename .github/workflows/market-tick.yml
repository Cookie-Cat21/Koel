# CSE market tick — prices, disclosures, book sample, share-split / alerts.
# Requires repo secrets: DATABASE_URL, TELEGRAM_BOT_TOKEN.
# Optional pause: vars.KOEL_OPS_PAUSE=1 (legacy KOEL_DAILY_OPS=0 no longer blocks cake jobs).
#
# Uses --force so the tick runs outside market hours (EOD catch-up) and on the
# intraday cadence (Vercel has no long-lived poller; this is the board writer).
# Not financial advice.

# ops: push-path catch-up enabled; telegram secret optional
name: market-tick

on:
  # Catch-up when this workflow file lands on main (Health checklist
  # matches by workflow name; agents cannot workflow_dispatch).
  push:
    branches: [main]
    paths:
      - ".github/workflows/market-tick.yml"
  workflow_dispatch:
  schedule:
    # Intraday board refresh during CSE hours (09:30–14:30 SLT ≈ 04:00–09:00 UTC),
    # weekdays — keeps Overview / Book Pressure / quotes fresh without a VM poller.
    - cron: "*/15 4-9 * * 1-5"
    # Daily ~15:00 Asia/Colombo (09:30 UTC) — after CSE close (14:30 SLT).
    - cron: "30 9 * * *"

concurrency:
  group: market-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      vars.KOEL_OPS_PAUSE != '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Require DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL secret is not set"
            exit 1
          fi
      - name: Migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m koel migrate
      - name: Market tick (force)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Tick requires a token to boot; alert delivery needs a real secret.
          # Placeholder is enough for board / Book Pressure accrual when the
          # repo secret is unset (poll-only — no Telegram sends without rules).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CSE_MIN_INTERVAL_SECONDS: "0.15"
          ORDER_BOOK_SAMPLE_SIZE: "15"
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN secret unset — using poll-only placeholder"
            export TELEGRAM_BOT_TOKEN="000:gha-market-tick-placeholder"
          fi
          python -m koel tick --force
