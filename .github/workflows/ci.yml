name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: lint-typecheck-unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev,macro]"

      # Factory loop status (E2-O03) — must exit 0; board/scoreboard smoke.
      # Keep ruff/mypy/pytest below; scripts/factory/verify.sh is the local
      # canonical verify (same tools) when citing pass reports.
      - name: Factory status
        run: python scripts/factory/loop_status.py

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy koel

      - name: Pytest (unit; no DATABASE_URL required)
        run: pytest
        env:
          # Ensure DB-backed tests skip in the unit job
          DATABASE_URL: ""

  integration:
    name: migrate-and-db-tests
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: .
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: koel
          POSTGRES_PASSWORD: koel
          POSTGRES_DB: koel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U koel -d koel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://koel:koel@localhost:5432/koel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev,macro]"

      # Applies db/migrations/*.sql in sorted order (incl. 007 briefs status,
      # 008 sectors). Presence pinned in tests/test_migrate_idempotent.py.
      - name: Apply migrations
        run: python -m koel.migrate

      - name: Collect integration tests (must not be empty)
        run: |
          set -euo pipefail
          pytest --collect-only --no-cov -m integration | tee /tmp/koel-integ-collect.txt
          if ! grep -Eq '[0-9]+/.* tests collected' /tmp/koel-integ-collect.txt; then
            echo "::error::integration collect produced no count line"
            exit 1
          fi
          # Deselected-only (0 selected) looks like "0/N tests collected"
          if grep -Eq '^0/' /tmp/koel-integ-collect.txt; then
            echo "::error::zero integration tests collected — marker wiring broke"
            exit 1
          fi
          echo "integration collect ok"

      - name: Pytest (DB integration marker suite)
        run: |
          set -euo pipefail
          # Marker-scoped: unit job already owns full-suite + cov gate.
          pytest --tb=line --no-cov -m integration -rs | tee /tmp/koel-db-pytest.txt

      - name: Require DB integration tests ran (not skipped)
        run: |
          set -euo pipefail
          # Primary suite already ran against service Postgres. Do not re-run
          # (warm DB). Gate on: env present + pytest reported passes + no
          # DATABASE_URL skip leakage for the integration marker set.
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "::error::DATABASE_URL empty in migrate job"
            exit 1
          fi
          if ! grep -Eq '[0-9]+ passed' /tmp/koel-db-pytest.txt; then
            echo "::error::No passed count in pytest output"
            exit 1
          fi
          # Full skip of DB suite would look like "0 passed" with many skipped —
          # reject zero passes.
          if grep -Eq '^0 passed' /tmp/koel-db-pytest.txt; then
            echo "::error::Zero tests passed; DB suite likely skipped"
            exit 1
          fi
          if grep -Eq 'SKIPPED.*(DATABASE_URL not set)' /tmp/koel-db-pytest.txt; then
            echo "::error::integration tests still skipped despite DATABASE_URL"
            exit 1
          fi
          # Any skip in the marked suite is a gate failure (RUN_WEB etc. are not
          # in -m integration).
          if grep -Eq '^[0-9]+ skipped' /tmp/koel-db-pytest.txt || \
             grep -Eq ', [0-9]+ skipped' /tmp/koel-db-pytest.txt; then
            echo "::error::integration marker suite reported skips"
            exit 1
          fi
          echo "DB integration gate ok"

  web:
    name: web-lint-typecheck-smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Next build
        run: npm run build
        env:
          # Build-time: session secret optional; smoke sets runtime env.
          DASH_SESSION_SECRET: ci-smoke-secret-not-for-prod
          DASH_DEMO_AUTH: "0"

      # Smoke: /login, /api/v1/health, mutate gate, plus wave6 browse
      # (/market + /api/v1/symbols|market/movers|sectors session-closed).
      - name: Dash smoke (next start + curl)
        working-directory: .
        run: bash scripts/factory/dash_smoke.sh
        env:
          DASH_DEMO_AUTH: "0"
          DASH_SESSION_SECRET: ci-smoke-secret-not-for-prod
